<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Session</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        /* Optional: Loading text if the frame takes a second */
        .loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: sans-serif;
            color: #666;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="loading-text">Loading Resource...</div>

    <iframe 
        src="https://duckduckgo.com/search?q=math+resources&kp=-1&kl=us-en" 
        allowfullscreen>
    </iframe>

</body>
</html>
