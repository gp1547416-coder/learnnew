<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Session</title>
    <style>
        /* Remove all margins and padding */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevents double scrollbars */
            background-color: #000; /* Dark background while loading */
        }

        /* Fill the entire screen with the iframe */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://www.croxyproxy.com/" 
        allow="autoplay; fullscreen; microphone; camera"
        allowfullscreen>
    </iframe>

</body>
</html>
